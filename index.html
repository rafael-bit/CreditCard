<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/style.css">
  <title>Card interative</title>
</head>
<body>
  <div class="container">
    <div class="checkout">
      <div class="credit-card-box">
        <div class="flip">
          <div class="front">
            <div class="chip"></div>
            <div class="logo">
              <img src="./images/visa.svg" alt="logo visa">
            </div>
            <div class="number">#### #### #### ####</div>
            <div class="card-holder">
              <label>Name</label>
              <div>##############</div>
            </div>
            <div class="card-expiration-date">
              <label>Expires</label>
              <div>##/##</div>
            </div>
          </div>
          <div class="back">
            <div class="strip"></div>
            <div class="logo">
              <img src="./images/visa.svg" alt="logo visa">
            </div>
            <div class="ccv">
              <label>CCV</label>
              <div>###</div>
            </div>
          </div>
        </div>
      </div>
      <form class="form" autocomplete="off" novalidate>
        <fieldset>
          <label for="card-number">Card Number</label>
          <input type="number" id="card-number" class="input-cart-number" maxlength="4" />
          <input type="number" id="card-number-1" class="input-cart-number" maxlength="4" />
          <input type="number" id="card-number-2" class="input-cart-number" maxlength="4" />
          <input type="number" id="card-number-3" class="input-cart-number" maxlength="4" />
        </fieldset>
        <fieldset>
          <label for="card-holder">Name</label>
          <input type="text" id="card-holder" />
        </fieldset>
        <fieldset class="fieldset-expiration">
          <label for="card-expiration-month">Expiration date</label>
          <div class="select">
            <select id="card-expiration-month">
              <option></option>
              <option>01</option>
              <option>02</option>
              <option>03</option>
              <option>04</option>
              <option>05</option>
              <option>06</option>
              <option>07</option>
              <option>08</option>
              <option>09</option>
              <option>10</option>
              <option>11</option>
              <option>12</option>
            </select>
          </div>
          <div class="select">
            <select id="card-expiration-year">
              <option></option>
              <option>2022</option>
              <option>2023</option>
              <option>2024</option>
              <option>2025</option>
              <option>2026</option>
              <option>2027</option>
              <option>2028</option>
              <option>2029</option>
              <option>2030</option>
              <option>2031</option>
              <option>2032</option>
              <option>2033</option>
              <option>2034</option>
              <option>2035</option>
              <option>2036</option>
              <option>2037</option>
              <option>2038</option>
              <option>2039</option>
              <option>2040</option>
            </select>
          </div>
        </fieldset>
        <fieldset class="fieldset-ccv">
          <label for="card-ccv">CCV</label>
          <input type="text" id="card-ccv" maxlength="3" />
        </fieldset>
        <button class="btn"><i class="fa fa-lock"></i>Submit</button>
      </form>
    </div>
  </div>
</body>
<script src="./script/script.js"></script>
</html>
